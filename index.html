*{box-sizing:border-box;margin:0;padding:0}

button{cursor:pointer;transition:all .18s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}

/* ── Mobile Responsive ── */
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.hdr-btns{display:flex;gap:6px;align-items:center;flex-shrink:0}
.tabs{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:1px}
.tabs::-webkit-scrollbar{display:none}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.card-hd{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer}
.card-ft{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;flex-wrap:wrap}
.card-ft button{min-height:38px}
.item-meta{display:flex;gap:10px;padding-left:25px;font-size:11px;color:#4a7a9a;flex-wrap:wrap}
.edit-r2{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.modal-box{background:#0a1520;border-radius:16px;padding:22px;
  width:min(600px,96vw);max-height:88vh;overflow-y:auto;animation:popIn .3s ease}

  .hdr-btns{margin-left:auto}

/* ── Weekly window helpers ── */
function getWeekKey() {
  var d = new Date();
  var thu = new Date(d); thu.setDate(d.getDate() + (4 - (d.getDay()||7)));
  var yr = thu.getFullYear();
  var jan1 = new Date(yr,0,1);
  var wk = Math.ceil(((thu - jan1)/86400000 + jan1.getDay() + 1)/7);
  return yr+'-W'+String(wk).padStart(2,'0');
}
function isInFillWindow() {
  var d   = new Date();
  var day = d.getDay();    // 0=Sun, 4=Thu
  var h   = d.getHours();
  var min = d.getMinutes();
  if (day === 0 && h < 23) return false;                              // Sun before 23:00
  if (day === 5 || day === 6) return false;                            // Fri, Sat = locked
  if (day === 4 && (h > 23 || (h === 23 && min >= 30))) return false;  // Thu after 23:30
  return true;
}
function nextOpenMs() {
  var d = new Date();
  var day = d.getDay();
  var daysUntil = day === 0 ? 7 : (7 - day);
  var next = new Date(d);
  next.setDate(d.getDate() + daysUntil);
  next.setHours(23,0,0,0);
  return next - d;
}
function nextCloseMs() {
  // ms until Thursday 23:30 (the next deadline)
  var d = new Date();
  var day = d.getDay();
  var daysUntilThu = (4 - day + 7) % 7;
  if (daysUntilThu === 0) {
    var h = d.getHours(); var min = d.getMinutes();
    if (h > 23 || (h === 23 && min >= 30)) daysUntilThu = 7; // already past, next Thu
  }
  var next = new Date(d);
  next.setDate(next.getDate() + daysUntilThu);
  next.setHours(23,30,0,0);
  return next - d;
}
function fmtCountdown(ms) {
  var s = Math.floor(ms/1000);
  var h = Math.floor(s/3600); s -= h*3600;
  var m = Math.floor(s/60);   s -= m*60;
  return (h?h+'h ':'') + m + 'm ' + s + 's';
}

function catInfo(it) {
  if (!it.cat || it.cat === 'other') {

  return found.length ? found[0] : {lb:'其他', ic:'📌', col:'#b44dff', bg:'#1a0a2a', dfW:1.0};
}

function fmtNow() {
  return new Date().toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});

function fmtDate(s) {
  if (!s) return '';
  if (s.includes('-')) { var p=s.split('-'); return p[1]+'/'+p[2]; }
  return s;
}
function toDateVal(s) {
  if (!s) return '';
  if (s.includes('-')) return s;
  var yr = new Date().getFullYear();
  var p = s.split('/');
  if (p.length===2) return yr+'-'+p[0]+'-'+p[1];
  return '';
}
async function sendToSheet(url, payload) {
  await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
}
async function archiveWeeklyReport(members, arcUrl, weekKey) {
  if (!arcUrl) return;
  var arcAt = fmtNow();
  var rows = members.map(function(m){
    var items = (m.items||[]).filter(function(it){ return !it.arc; });
    var total = items.length;
    var done  = items.filter(function(it){ return it.cp===100; }).length;
    var avgDf = total
      ? (items.reduce(function(a,it){ return a+(it.df||3); }, 0) / total).toFixed(1)
      : '—';
    return sendToSheet(arcUrl, {
      type:'weekly_archive', weekKey:weekKey, arcAt:arcAt,
      member:m.nm, mbti:m.mbti||'—',
      reported: m.reported===weekKey ? '✅' : '❌',
      totalItems:total, doneCnt:done,
      clearRate: total ? Math.round(done/total*100)+'%' : '—',
      avgDiff:avgDf, mood:m.mood||3
    });
  });
  await Promise.allSettled(rows);
}

/* ── Group Scoring ── */
function calcGroupScores(members, params) {
  const p = params;
  const active = members.filter(function(m) { return m.items && m.items.length > 0; });
  const n = active.length || 1;
  const gCp = active.reduce(function(a,m){
    return a + m.items.reduce(function(s,it){return s+it.cp;},0)/m.items.length;
  },0)/n;
  const gDf = active.reduce(function(a,m){
    return a + m.items.reduce(function(s,it){return s+(it.df||3);},0)/m.items.length;
  },0)/n;
  const gCt = active.reduce(function(a,m){return a+m.items.length;},0)/n;
  const result = {};
  members.forEach(function(m) {
    if (!m.items || !m.items.length) { result[m.id] = 5; return; }
    const mCp = m.items.reduce(function(a,it){return a+it.cp;},0)/m.items.length;
    const mDf = m.items.reduce(function(a,it){
      const w = catInfo(it).dfW;
      return a + (it.df||3) * w;
    },0)/m.items.length;
    const mCt = m.items.length;
    const cpS = Math.max(0, Math.min(10, 5 + (mCp - gCp)/10));
    const dfS = Math.max(0, Math.min(10, 5 + (mDf - gDf)*1.5));
    const qS  = Math.max(0, Math.min(10, 5 + (mCt - gCt)));
    const doneRatio = m.items.filter(function(it){return it.cp===100;}).length / m.items.length;
    const tS  = Math.max(0, Math.min(10, doneRatio * 10 + 3));
    const moodBonus = m.mood >= 4 ? 0.6 : m.mood >= 3 ? 0.3 : 0;
    const raw = (cpS*p.wC + dfS*p.wD + qS*p.wI + tS*p.wO)/100 + moodBonus;
    result[m.id] = Math.max(0, Math.min(10, Math.round(raw*10)/10));
  });
  return result;
}
function getFinal(m, baseScores) {
  const base = baseScores[m.id] !== undefined ? baseScores[m.id] : 5;
  return Math.max(0, Math.min(10, Math.round((base+(m.adj||0))*10)/10));
}

/* ── UI components ── */
function Ring({p, c, s}) {
  const sz=s||52, r=sz/2-6, ci=2*Math.PI*r;
  return (
    <svg width={sz} height={sz} style={{transform:'rotate(-90deg)'}}>
      <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="#1e2a3a" strokeWidth="5"/>
      <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={c||'#00d4ff'} strokeWidth="5"
        strokeDasharray={ci} strokeDashoffset={ci-p/100*ci} style={{transition:'stroke-dashoffset .5s'}}/>
    </svg>
  );
}
function Toast({msg, ok, done}) {
  useEffect(()=>{const t=setTimeout(done,3500);return()=>clearTimeout(t);},[]);
  const bd = ok?'#00ffaa':'#ff4da6';
  return (
    <div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',
      background:ok?'#003d2e':'#3d001a',border:'1px solid '+bd,color:'#fff',
      padding:'10px 24px',borderRadius:24,zIndex:9999,fontSize:13,fontWeight:600,
      boxShadow:'0 0 20px '+bd+'55',whiteSpace:'nowrap',animation:'popIn .3s ease'}}>
      {msg}
    </div>
  );
}
function Conf({on}) {
  if (!on) return null;
  const es=['🎉','✨','🌟','💫','🎊','⭐','🎈','🏆','🎯','💥'];
  return (
    <div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:8888}}>
      {es.map(function(e,i){
        return (
          <div key={i} style={{position:'absolute',left:(5+i*10)+'%',top:'-30px',
            fontSize:26,animation:'fall 2.4s ease-in forwards',animationDelay:(i*.12)+'s'}}>{e}</div>
        );
      })}
    </div>
  );
}

      const dims = MBTI_Q.map(function(q,i){ return {dim:q.dim, v:na[i]}; });

      dims.forEach(function(d) {
        if (d.dim==='EI') type += d.v===0?'E':'I';
        if (d.dim==='SN') type += d.v===1?'N':'S';
        if (d.dim==='TF') type += d.v===0?'T':'F';
        if (d.dim==='JP') type += d.v===0?'J':'P';
      });
      setResult(type);
    }
  }

  const q = MBTI_Q[step];
  const mbtiCol = '#b44dff';

  if (result) {
    const motiv = getMbtiMotiv(result);
    return (
      <div className="modal-overlay" style={{position:'fixed',inset:0,background:'#000c',zIndex:3200,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div className="modal-box" style={{border:'1px solid '+mbtiCol,textAlign:'center',maxWidth:'min(380px,96vw)'}}>
          <div style={{fontSize:40,marginBottom:8}}>🧠</div>
          <div style={{color:mbtiCol,fontWeight:800,fontSize:22,marginBottom:4}}>{result}</div>
          <div style={{color:'#cce8f8',fontSize:13,marginBottom:12,fontWeight:600}}>
            {m.nm} 的人格類型
          </div>
          <div style={{background:'#0d1a2a',border:'1px solid '+mbtiCol+'44',borderRadius:10,
            padding:'12px 16px',marginBottom:20,color:'#d0e8ff',fontSize:14,lineHeight:1.8}}>
            💬 {motiv}
          </div>
          <button onClick={function(){onDone(result);}}
            style={{width:'100%',background:'#1a0a2a',border:'1px solid '+mbtiCol,color:mbtiCol,
              borderRadius:10,padding:'12px',fontWeight:700,fontSize:15}}>
            確認，開始填報 ✓
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-overlay" style={{position:'fixed',inset:0,background:'#000c',zIndex:3200,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div className="modal-box" style={{border:'1px solid '+mbtiCol,maxWidth:'min(420px,96vw)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{color:mbtiCol,fontWeight:700,fontSize:15}}>🧠 人格分析 — {m.nm}</div>
          <button onClick={onClose} style={{background:'transparent',border:'none',color:'#88a',fontSize:22}}>✕</button>
        </div>
        {/* progress */}
        <div style={{display:'flex',gap:4,marginBottom:20}}>
          {MBTI_Q.map(function(_,i){
            return (
              <div key={i} style={{flex:1,height:4,borderRadius:2,
                background:i<=step?(i<step?mbtiCol:mbtiCol+'99'):'#1e2a3a'}}/>
            );
          })}
        </div>
        <div style={{color:'#cce8f8',fontSize:15,fontWeight:600,marginBottom:20,lineHeight:1.6,textAlign:'center'}}>
          {q.q}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {q.a.map(function(opt,idx){
            return (
              <button key={idx} onClick={function(){pick(idx);}}
                style={{background:'#0d1820',border:'1px solid '+mbtiCol+'66',color:'#cce8f8',
                  borderRadius:10,padding:'14px 16px',fontSize:14,textAlign:'left',
                  transition:'all .15s'}}>
                {idx===0?'🅰 ':'🅱 '}{opt}
              </button>
            );
          })}
        </div>
        <div style={{color:'#4a6a8a',fontSize:11,textAlign:'center',marginTop:14}}>
          第 {step+1} / {MBTI_Q.length} 題
        </div>
      </div>
    </div>
  );
}

                  <span style={{fontSize:10,color:'#39ff14',paddingLeft:2}}>起始日</span>
                  <input type="date" value={toDateVal(it.sd||'')} disabled={isArc}
                    onChange={function(e){upd(i,{...it,sd:e.target.value});}}
                    style={{background:'#0d1820',border:'1px solid #39ff1444',color:'#39ff14',
                      borderRadius:6,padding:'4px 6px',fontSize:13,width:'100%'}}/>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:2,minWidth:0}}>
                  <span style={{fontSize:10,color:'#00cfff',paddingLeft:2}}>預計完成日</span>
                  <input type="date" value={toDateVal(it.dd||'')} disabled={isArc}
                    onChange={function(e){upd(i,{...it,dd:e.target.value});}}
                    style={{background:'#0d1820',border:'1px solid #00cfff44',color:'#00cfff',
                      borderRadius:6,padding:'4px 6px',fontSize:13,width:'100%'}}/>
                </div>
              </div>
              {/* Row 3: 本週進度概述 */}
              <div style={{marginTop:6}}>
                <textarea value={it.note||''} disabled={isArc}
                  onChange={function(e){upd(i,{...it,note:e.target.value});}}
                  placeholder="本週進度概述（說明本週實際進展、遇到的問題或備註）"
                  rows={2}
                  style={{width:'100%',background:'#060c18',border:'1px solid #2a3a5a',
                    color:'#a0c4e0',borderRadius:6,padding:'6px 8px',fontSize:12,
                    resize:'vertical',boxSizing:'border-box',lineHeight:1.6,
                    opacity:isArc?0.6:1}}/>
              </div>
            </div>
          );
        })}
        <button onClick={add}
          style={{width:'100%',background:'#0d2030',border:'1px dashed #1e5a7a',color:'#4a9ab8',
            borderRadius:8,padding:'8px',marginBottom:16,marginTop:4,fontSize:13}}>

      </div>
    </div>
  );

/* ── Member Card ── */
function MCard({m, score, isAdmin, onEdit, onScore, onDelete, onArchiveItem, onAdviceChange, onAddItem, onRemoveItem}) {
  const [open, setOpen] = useState(false);
  const [archiving, setArchiving] = useState(null);
  const [showArc, setShowArc] = useState(false);
  const acp = (m.items && m.items.length)
    ? Math.round(m.items.reduce(function(a,it){return a+it.cp;},0)/m.items.length) : 0;
  const doneThisWeek = m.reported === getWeekKey();
  const sc = score;
  const cpColors = ['#3a5a7a','#ff9500','#00cfff','#b44dff','#00ffaa'];

  function doArchive(it) {
    setArchiving(it.id);
    onArchiveItem(m, it, function(){setArchiving(null);});
  }

  function buildReport() {
    const lines = ['【週報】' + WEEK_LB + ' — ' + m.nm, ''];
    m.items.forEach(function(it){
      const ci = catInfo(it);
      lines.push('[' + ci.lb + '] ' + it.tx);
      lines.push('  完成比例：' + it.cp + '%  難度：' + stars(it.df) + '  預計完成日：' + (fmtDate(it.dd)||'—'));
      if (it.note) lines.push('  進度：' + it.note);
    });
    lines.push('');
    lines.push('整體完成率：' + acp + '%');
    return lines.join('\n');
  }

  function genEmail() {
    const subj = encodeURIComponent('[週報] ' + WEEK_LB + ' — ' + m.nm);
    const body = encodeURIComponent(buildReport());
    window.open('mailto:?subject=' + subj + '&body=' + body);
  }

  function genLine() {
    window.open('https://line.me/R/msg/text/?' + encodeURIComponent(buildReport()));
  }

  return (
    <div style={{background: doneThisWeek?'#030e08':'#070f18',
      border:'1px solid '+(doneThisWeek?'#00ffaa':(open?m.col:'#1a2a3a')),
      borderRadius:14,marginBottom:10,overflow:'hidden',transition:'all .3s',
      boxShadow:doneThisWeek?'0 0 10px #00ffaa33':(open?('0 0 14px '+m.col+'44'):'none')}}>
      {/* Header */}
      <div className="card-hd" onClick={function(){setOpen(!open);}}>
        <div style={{width:42,height:42,borderRadius:'50%',border:'2px solid '+m.col,flexShrink:0,
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:700,
          color:m.col,background:'linear-gradient(135deg,'+m.col+'22,'+m.col+'66)'}}>
          {m.nm.slice(-1)}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,flexWrap:'wrap'}}>
            <span style={{color:'#eef4ff',fontWeight:700,fontSize:15}}>{m.nm}</span>
            <span style={{fontSize:16}}>{MDS[m.mood]}</span>
            <span style={{fontSize:10,color:'#5a7a9a'}}>{MDB[m.mood]}</span>
            {m.mbti && (
              <span style={{fontSize:10,background:'#1a0a2a',border:'1px solid #b44dff66',
                color:'#b44dff',padding:'1px 6px',borderRadius:8,fontWeight:700}}>
                {m.mbti}
              </span>
            )}
            {doneThisWeek && (
              <span style={{fontSize:10,background:'#003d1a',border:'1px solid #00ffaa88',
                color:'#00ffaa',padding:'1px 8px',borderRadius:8,fontWeight:700}}>
                ✅ 本週已完成
              </span>
            )}
            {m.cm && (
              <span style={{fontSize:10,color:'#7a9ab8',flex:1,overflow:'hidden',
                textOverflow:'ellipsis',whiteSpace:'nowrap'}}>「{m.cm}」</span>
            )}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{flex:1,height:5,background:'#1a2a3a',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',width:acp+'%',background:m.col,borderRadius:3,transition:'width .6s'}}/>
            </div>
            <span style={{fontSize:12,color:m.col,fontWeight:700,minWidth:34}}>{acp}%</span>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          <div className="ring-wrap" style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
            <Ring p={acp} c={m.col} s={44}/>
            <span style={{position:'absolute',fontSize:9,fontWeight:700,color:m.col}}>{acp}</span>
          </div>
          <div style={{textAlign:'center',minWidth:28}}>
            <div style={{fontSize:16,fontWeight:800,color:scCol(sc)}}>{sc.toFixed(1)}</div>
            <div style={{fontSize:9,color:'#4a6a8a'}}>分</div>
          </div>
          <span style={{color:'#4a6a8a',fontSize:13}}>{open?'▲':'▼'}</span>
        </div>
      </div>

      {/* Body */}
      {open && (
        <div style={{borderTop:'1px solid #1a2a3a',padding:'12px 16px'}}>
          {m.mbti && (
            <div style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:12,
              background:'#0d1020',border:'1px solid #b44dff33',borderRadius:10,padding:'10px 12px'}}>
              <span style={{fontSize:18,flexShrink:0}}>💬</span>
              <div>
                <span style={{fontSize:10,color:'#b44dff',fontWeight:700,marginRight:6}}>{m.mbti}</span>
                <span style={{fontSize:12,color:'#c0b8e0',lineHeight:1.6}}>{getMbtiMotiv(m.mbti)}</span>
              </div>

          {(!m.items||!m.items.length) && (
            <div style={{color:'#4a6a8a',textAlign:'center',padding:'10px 0',fontSize:13}}>

            </div>
          )}
          {m.items && m.items.map(function(it){
            const ci2 = it.cp===100?4:it.cp>=75?3:it.cp>=50?2:it.cp>=25?1:0;
            const dfCol = it.df>=5?'#ff4da6':it.df>=4?'#ff9500':it.df>=3?'#ffd700':it.df>=2?'#00cfff':'#00ffaa';
            const isArc = it.arc===true;
            const isBusy = archiving===it.id;
            const cinfo = catInfo(it);
            return (
              <div key={it.id} className={isArc?'arc-row':''}
                style={{padding:'8px 0',borderBottom:'1px solid #0d1820'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  {/* 勾選框 */}
                  <div style={{width:17,height:17,borderRadius:4,flexShrink:0,
                    border:'2px solid '+(isArc?'#00ffaa':cpColors[ci2]),
                    background:isArc?'#00ffaa22':'transparent',

                    fontSize:11,color:'#00ffaa'}}>
                    {isArc && '✓'}
                  </div>
                  {/* 分類標籤 */}
                  <span style={{fontSize:11,padding:'1px 7px',borderRadius:10,flexShrink:0,
                    background:cinfo.bg,color:cinfo.col,border:'1px solid '+cinfo.col+'55'}}>
                    {cinfo.ic} {cinfo.lb}

                  <span style={{flex:1,color:isArc?'#5a8a6a':'#cce8f8',fontSize:13,
                    textDecoration:isArc?'line-through':'none'}}>{it.tx}</span>
                  {/* 完成率 */}
                  <span style={{fontSize:12,fontWeight:700,color:cpColors[ci2],minWidth:32,textAlign:'right'}}>{it.cp}%</span>

                  {isArc
                    ? <span className="done-badge">📁 已歸檔</span>

                  )}
                </div>
                {/* 次要資訊 */}
                <div className="item-meta" style={{marginBottom: it.note ? 4 : 0}}>
                  <span style={{color:dfCol}}>{'難度 '+stars(it.df)}</span>
                  {it.sd  && <span style={{color:'#39ff14'}}>🗓 起：{fmtDate(it.sd)}</span>}
                  {it.dd  && <span style={{color:'#00cfff'}}>🎯 完成：{fmtDate(it.dd)}</span>}
                </div>
                {it.note && (
                  <div style={{marginLeft:25,marginTop:2,padding:'5px 10px',
                    background:'#060c18',borderLeft:'2px solid #2a4a6a',
                    color:'#7aa8c8',fontSize:12,lineHeight:1.6,borderRadius:'0 4px 4px 0',
                    whiteSpace:'pre-wrap'}}>
                    📝 {it.note}
                  </div>
                )}
                {isAdmin && !isArc && (
                  <textarea value={it.advice||''}
                    onChange={function(e){onAdviceChange(m.id,it.id,e.target.value);}}
                    placeholder="💡 主管建議（僅管理員可編輯）"
                    rows={2}
                    style={{display:'block',width:'calc(100% - 25px)',marginLeft:25,marginTop:4,
                      padding:'5px 10px',background:'#0c1424',
                      border:'1px solid #ffd70044',color:'#ffd700',fontSize:12,
                      lineHeight:1.6,borderRadius:'0 4px 4px 0',
                      resize:'vertical',boxSizing:'border-box'}}/>
                )}
                {!isAdmin && it.advice && (
                  <div style={{marginLeft:25,marginTop:2,padding:'5px 10px',
                    background:'#0c1424',borderLeft:'2px solid #ffd70066',
                    color:'#ffd700',fontSize:12,lineHeight:1.6,borderRadius:'0 4px 4px 0',
                    whiteSpace:'pre-wrap'}}>
                    💡 {it.advice}

          {m.items && m.items.some(function(it){return it.arc;}) && (
            <div style={{marginTop:6,textAlign:'right'}}>
              <button onClick={function(e){e.stopPropagation();setShowArc(true);}}

          {isAdmin && (
            <div style={{marginTop:8,marginBottom:4}}>
              <button onClick={function(){onAddItem(m);}}
                style={{background:'#0a1a2a',border:'1px dashed #00d4ff66',color:'#00d4ff',
                  borderRadius:8,padding:'5px 14px',fontSize:12,cursor:'pointer',width:'100%',
                  letterSpacing:.3}}>＋ 新增工作項目</button>
            </div>
          )}
          <div className="card-ft">
            <button onClick={genEmail}
              style={{background:'#0d1830',border:'1px solid #4a7aaa',color:'#7ab4cc',
                borderRadius:8,padding:'6px 14px',fontSize:13}}>
              📧 寄送
            </button>
            {isAdmin && (
              <button onClick={genLine}
                style={{background:'#0d2010',border:'1px solid #00c300',color:'#00c300',
                  borderRadius:8,padding:'6px 14px',fontSize:13}}>
                💬 LINE 分享
              </button>
            )}
            <button onClick={function(){onEdit(m);}}
              style={{background:'#0d2030',border:'1px solid '+m.col,color:m.col,
                borderRadius:8,padding:'6px 16px',fontSize:13}}>✏️ 填報</button>
            {isAdmin && (
              <button onClick={function(){onScore(m);}}
                style={{background:'#1a2010',border:'1px solid #ffd700',color:'#ffd700',
                  borderRadius:8,padding:'6px 16px',fontSize:13}}>⭐ 評分</button>
            )}
            {isAdmin && (
              <button onClick={function(){onDelete(m);}}
                style={{background:'#3a0010',border:'1px solid #ff4da6',color:'#ff4da6',
                  borderRadius:8,padding:'6px 14px',fontSize:13}}>🗑️ 刪除</button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════ APP ══════════════ */
function App() {
  const [ms, setMs]               = useState(INIT);
  const [tab, setTab]             = useState('rpt');
  const [edit, setEdit]           = useState(null);
  const [scoreM, setScoreM]       = useState(null);
  const [toast, setToast]         = useState(null);
  const [conf, setConf]           = useState(false);
  const [isAdm, setIsAdm]         = useState(false);
  const [showAdm, setShowAdm]     = useState(false);
  const [showSets, setShowSets]   = useState(false);
  const [showPrm, setShowPrm]     = useState(false);
  const [pw, setPw]               = useState('');
  const [authReq, setAuthReq]     = useState(null);
  const [mbtiReq, setMbtiReq]     = useState(null);
  const [countdown, setCountdown]       = useState('');
  const [closeCountdown, setCloseCd]    = useState('');
  const [fillOpen, setFillOpen]         = useState(isInFillWindow);
  const [gasUrl, setGasUrl]       = useState(function(){ return localStorage.getItem(GAS_KEY)||''; });
  const [arcUrl, setArcUrl]       = useState(function(){ return localStorage.getItem(ARC_KEY)||''; });
  const [sheetUrl, setSheetUrl]       = useState(function(){ return localStorage.getItem(SHEET_KEY)||''; });
  const [arcSheetUrl, setArcSheetUrl] = useState(function(){ return localStorage.getItem(ARC_SHEET_KEY)||''; });
  const [arcDone, setArcDone]     = useState(function(){ return localStorage.getItem(ARC_DONE)===getWeekKey(); });
  const [params, setParams]       = useState(loadParams);
  const msRef = useRef(null);
  msRef.current = ms;

  useEffect(function(){
    var prevOpen = isInFillWindow();
    function tick(){
      var open = isInFillWindow();
      setFillOpen(open);
      if (!open) setCountdown(fmtCountdown(nextOpenMs()));
      if (open)  setCloseCd(fmtCountdown(nextCloseMs()));
      // Reset arcDone when new week starts (Sun 23:00)
      var curWk = getWeekKey();
      if (open && localStorage.getItem(ARC_DONE) !== curWk) {
        setArcDone(false);
      }
      // Auto-archive when fill window just closed (Thu 23:30)
      if (prevOpen && !open) {
        var wk  = curWk;
        var arc = localStorage.getItem(ARC_KEY) || localStorage.getItem(GAS_KEY);
        var lastDone = localStorage.getItem(ARC_DONE);
        if (arc && lastDone !== wk) {
          localStorage.setItem(ARC_DONE, wk);
          setArcDone(true);
          archiveWeeklyReport(msRef.current, arc, wk)
            .then(function(){ showToast('✅ 週報已自動歸檔！', true); })
            .catch(function(){ showToast('⚠️ 自動歸檔失敗', false); });
        }
      }
      prevOpen = open;
    }
    tick();
    var t = setInterval(tick, 1000);
    return function(){ clearInterval(t); };
  }, []);

  /* compute group scores */
  const baseScores = calcGroupScores(ms, params);
  function getScoreFor(m) { return getFinal(m, baseScores); }

  function showToast(msg,ok) { setToast({msg,ok}); }
  function boom() { setConf(true); setTimeout(function(){setConf(false);},2500); }

  function saveGas(url, arc, sht, arcSht) {
    setGasUrl(url);          localStorage.setItem(GAS_KEY,       url);
    setArcUrl(arc);          localStorage.setItem(ARC_KEY,       arc);
    setSheetUrl(sht);        localStorage.setItem(SHEET_KEY,     sht);
    setArcSheetUrl(arcSht);  localStorage.setItem(ARC_SHEET_KEY, arcSht);
    setShowSets(false);
    showToast('✅ 設定已儲存', true);
  }
  function manualArchive() {
    var target = arcUrl || gasUrl;
    if (!target) { setShowSets(true); return; }  // 未設定時直接開設定頁
    var wk = getWeekKey();
    archiveWeeklyReport(msRef.current, target, wk)
      .then(function(){
        localStorage.setItem(ARC_DONE, wk);
        setArcDone(true);
        showToast('✅ 週報已完成歸檔！', true);
      })
      .catch(function(){ showToast('⚠️ 歸檔失敗，請確認 Sheets 網址', false); });
  }
  function saveParams(p) {
    setParams(p); localStorage.setItem(PRM_KEY,JSON.stringify(p));
    setShowPrm(false); showToast('✅ 評分參數已更新',true);
  }

  function archiveItem(m, it, done) {
    const arcAt = fmtNow();
    setMs(function(prev){
      return prev.map(function(mem){
        if (mem.id!==m.id) return mem;
        const newItems = mem.items.map(function(x){
          if (x.id!==it.id) return x;
          const r = {...x}; r.cp=100; r.arc=true; r.arcAt=arcAt; return r;
        });
        const u = {...mem}; u.items=newItems; return u;
      });
    });
    if (!gasUrl) {
      showToast('⚠️ 未設定 Sheets，僅本地完成',false); done(); boom(); return;
    }
    const cinfo = catInfo(it);
    const payload = {arcAt:arcAt,member:m.nm,category:cinfo.ic+' '+cinfo.lb,
      task:it.tx,startDate:it.sd||'—',deadline:it.dd||'—',eta:it.eta||'—',
      progress:'100%',difficulty:stars(it.df),note:it.note||''};
    sendToSheet(gasUrl,payload)
      .then(function(){ showToast('📁「'+it.tx+'」已歸檔到 Sheets！',true); boom(); })
      .catch(function(){ showToast('⚠️ 本地完成，Sheets 傳送失敗',false); })
      .finally(function(){ done(); });
  }

  function saveEdit(nm) {
    const saved = {...nm, reported: getWeekKey()};
    setMs(ms.map(function(m){ return m.id===saved.id?saved:m; }));
    setEdit(null); showToast('✅ '+saved.nm+' 本週回報已完成！',true);
    if (saved.items&&saved.items.length&&saved.items.every(function(it){return it.cp===100;})) boom();
  }
  function saveScore(nm) {
    setMs(ms.map(function(m){
      if (m.id!==nm.id) return m;
      const r={...m}; r.adj=nm.adj; r.cm=nm.cm; return r;
    }));
    setScoreM(null); showToast('⭐ 評分已儲存！',true);
  }
  function addItemToMember(m) {
    const newItem = {id:mkId(), tx:'', cp:0, df:3, sd:'', dd:'', cat:'other', catTx:'', advice:''};
    setMs(function(prev){
      return prev.map(function(mem){
        if (mem.id!==m.id) return mem;
        return {...mem, items:[...(mem.items||[]), newItem]};
      });
    });
    // Open edit so they can fill in details
    setEdit({...m, items:[...(m.items||[]), newItem]});
    showToast('➕ 已新增工作項目，請填寫內容', true);
  }
  function removeItemFromMember(m, itemId) {
    if (!window.confirm('確定刪除此工作項目？')) return;
    setMs(function(prev){
      return prev.map(function(mem){
        if (mem.id!==m.id) return mem;
        return {...mem, items:(mem.items||[]).filter(function(it){return it.id!==itemId;})};
      });
    });
    showToast('🗑️ 已刪除工作項目', true);
  }
  function deleteMember(m) {
    if (!window.confirm('確定刪除「'+m.nm+'」？')) return;
    setMs(function(prev){return prev.filter(function(x){return x.id!==m.id;});});
    showToast('🗑️ 已刪除：'+m.nm,true);
  }
  function tryAdm() {
    if (pw==='0721') {
      setIsAdm(true); setShowAdm(false); setPw(''); showToast('👑 管理員登入成功',true);
    } else { showToast('❌ 密碼錯誤',false); }
  }
  function onEditRequest(m) {
    if (isAdm) { setEdit(m); return; }          // 管理員直接進入，不受任何限制
    if (!fillOpen) {
      showToast('🔒 填報尚未開放，週日 23:00 起開放', false); return;
    }
    if (!m.mbti) { setMbtiReq({m:m}); return; }
    if (!m.pwd) { setEdit(m); return; }
    setAuthReq({m:m});
  }
  function onMbtiDone(m, mbtiType) {
    setMs(function(prev){
      return prev.map(function(x){ return x.id===m.id ? {...x, mbti:mbtiType} : x; });
    });
    const updated = {...m, mbti:mbtiType};
    setMbtiReq(null);
    if (isAdm || !m.pwd) { setEdit(updated); return; }
    setAuthReq({m:updated});
  }
  function onAdviceChange(memberId, itemId, advice) {
    setMs(function(prev) {
      return prev.map(function(mem) {
        if (mem.id !== memberId) return mem;
        const newItems = mem.items.map(function(it) {
          if (it.id !== itemId) return it;
          const r = {...it}; r.advice = advice; return r;
        });
        const r = {...mem}; r.items = newItems; return r;
      });
    });
  }

  /* 全組統計 */
  const avgAll = Math.round(ms.reduce(function(a,m){
    if (!m.items||!m.items.length) return a;
    return a + m.items.reduce(function(s,it){return s+it.cp;},0)/m.items.length;
  },0)/ms.length);
  const avgScore = Math.round(ms.reduce(function(a,m){return a+getScoreFor(m);},0)/ms.length*10)/10;
  const arcTotal = ms.reduce(function(a,m){
    return a+(m.items?m.items.filter(function(it){return it.arc;}).length:0);
  },0);
  const allActItems = ms.reduce(function(a,m){return a.concat(m.items||[]);}, []).filter(function(it){return !it.arc;});
  const clearRate = allActItems.length ? Math.round(allActItems.filter(function(it){return it.cp===100;}).length/allActItems.length*100) : 0;

  const ranked = ms.slice().sort(function(a,b){return getScoreFor(b)-getScoreFor(a);});
  const medals = ['🥇','🥈','🥉'];
  const TABS = [{k:'rpt',lb:'📋 週報',adm:false},{k:'rnk',lb:'🏆 排行',adm:true},{k:'stat',lb:'📊 統計',adm:false}];

  return (
    <div style={{minHeight:'100vh',background:'#040b12',paddingBottom:48}}>
      <Conf on={conf}/>
      {toast && <Toast msg={toast.msg} ok={toast.ok} done={function(){setToast(null);}}/>}
      {edit   && <EditM m={edit} isAdmin={isAdm} onSave={saveEdit} onClose={function(){setEdit(null);}}/>}
      {authReq && <MemberAuthM m={authReq.m}
                    onAuth={function(){setEdit(authReq.m);setAuthReq(null);}}
                    onClose={function(){setAuthReq(null);}}/>}
      {mbtiReq && <MbtiM m={mbtiReq.m}
                    onDone={function(type){onMbtiDone(mbtiReq.m,type);}}
                    onClose={function(){setMbtiReq(null);}}/>}
      {scoreM && <ScoreM m={scoreM} baseScore={baseScores[scoreM.id]||5}
                   onSave={saveScore} onClose={function(){setScoreM(null);}}/>}
      {showSets && <SettingsM gasUrl={gasUrl} arcUrl={arcUrl} sheetUrl={sheetUrl} arcSheetUrl={arcSheetUrl} onSave={saveGas} onClose={function(){setShowSets(false);}}/>}
      {showPrm  && <ScoreParamsM params={params} onSave={saveParams} onClose={function(){setShowPrm(false);}}/>}

      {/* Admin Login */}
      {showAdm && (
        <div className="modal-overlay" style={{position:'fixed',inset:0,background:'#000b',zIndex:3000,
          display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div className="modal-box" style={{border:'1px solid #ffd700',maxWidth:'min(320px,96vw)'}}>
            <div style={{color:'#ffd700',fontWeight:700,fontSize:16,marginBottom:14}}>🔐 管理員登入</div>
            <input type="password" value={pw}
              onChange={function(e){setPw(e.target.value);}}
              onKeyDown={function(e){if(e.key==='Enter')tryAdm();}}
              placeholder="輸入密碼" autoFocus
              style={{width:'100%',background:'#0d1820',border:'1px solid #1e3a4a',color:'#cce8f8',
                borderRadius:8,padding:'10px',fontSize:14,boxSizing:'border-box',marginBottom:12}}/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={function(){setShowAdm(false);setPw('');}}
                style={{flex:1,background:'#0d1820',border:'1px solid #1e3a4a',
                  color:'#7a9ab8',borderRadius:8,padding:'9px',fontSize:13}}>取消</button>
              <button onClick={tryAdm}
                style={{flex:1,background:'#1a2010',border:'1px solid #ffd700',
                  color:'#ffd700',borderRadius:8,padding:'9px',fontWeight:700,fontSize:13}}>確認</button>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{background:'#070f18',borderBottom:'1px solid #1a2a3a',padding:'12px 16px 0'}}>
        <div style={{maxWidth:740,margin:'0 auto'}}>
          <div className="hdr-row">
            <div style={{minWidth:0,flex:1}}>
              <div className="title-txt" style={{fontWeight:800,fontSize:18,color:'#00d4ff',letterSpacing:.5}}>
                🌊 海洋資源開發專題 工作進度回報
              </div>
              <div className="sub-txt" style={{fontSize:11,marginTop:3,lineHeight:1.8}}>
                <span style={{color:'#b8a000'}}>{WEEK_LB}　上週工作清空率 {clearRate}%　團隊總人數 {ms.length} 人</span><br/>
                {fillOpen
                  ? <span style={{color:'#00ffaa',fontWeight:700}}>📝 填報開放中（週四 23:30 截止，{closeCountdown} 後關閉）</span>
                  : <span style={{color:'#ff9500'}}>🔒 {countdown} 後開放</span>
                }
              </div>
            </div>
            <div className="hdr-btns">
              {/* 已完成並歸檔 → 最左，開啟週報歸檔試算表 */}
              {isAdm && arcDone && (
                <button onClick={function(){ arcSheetUrl ? window.open(arcSheetUrl,'_blank') : setShowSets(true); }}
                  style={{background:'#0d1820',border:'1px solid #ffffff55',color:'#ffffff',
                    borderRadius:8,padding:'8px 14px',fontSize:13,fontWeight:600,
                    whiteSpace:'nowrap',cursor:'pointer',minWidth:130,textAlign:'center'}}>
                  已完成並歸檔
                </button>
              )}
              {/* 每週工作紀錄 → 開啟項目歸檔試算表 */}
              <button onClick={function(){ sheetUrl ? window.open(sheetUrl,'_blank') : setShowSets(true); }}
                style={{background:'#0d1820',border:'1px solid #ffffff55',color:'#ffffff',
                  borderRadius:8,padding:'8px 14px',fontSize:13,fontWeight:600,
                  whiteSpace:'nowrap',minWidth:130,textAlign:'center'}}>
                每週工作紀錄
              </button>
              {/* 設定連結（⚙️）*/}
              <button onClick={function(){setShowSets(true);}}
                style={{background:'#0d1820',border:'1px solid #1e3a4a',color:'#4a6a8a',
                  borderRadius:8,padding:'8px 10px',fontSize:14}}>⚙️</button>
              {isAdm && !arcDone && (
                <button onClick={manualArchive}
                  title="手動歸檔本週週報"
                  style={{background:'#0d1820',border:'1px solid #ffaa44',
                    color:'#ffaa44',borderRadius:8,padding:'7px 12px',fontSize:13,fontWeight:600,whiteSpace:'nowrap'}}>
                  完成歸檔
                </button>
              )}
              {/* 評分參數（原皇冠位置）*/}
              {isAdm && (
                <button onClick={function(){setShowPrm(true);}}
                  style={{background:'#1a2010',border:'1px solid #ffd700',color:'#ffd700',
                    borderRadius:8,padding:'8px 12px',fontSize:16}}>📐</button>
              )}
              <button onClick={function(){
                  if(isAdm){setIsAdm(false);if(tab==='rnk')setTab('rpt');showToast('已登出',true);}
                  else setShowAdm(true);
                }}
                style={{background:'#0d1820',border:'1px solid '+(isAdm?'#ffd700':'#1e3a4a'),
                  color:isAdm?'#ffd700':'#7a9ab8',borderRadius:8,padding:'8px 12px',fontSize:14}}>
                {isAdm?'登出':'🔐'}
              </button>
            </div>
          </div>
          <div className="tabs">
            {TABS.filter(function(tb){return !tb.adm || isAdm;}).map(function(tb){
              const a=tab===tb.k;
              return (
                <button key={tb.k} onClick={function(){setTab(tb.k);}}
                  style={{background:a?'#00d4ff22':'transparent',
                    border:a?'1px solid #00d4ff':'1px solid transparent',
                    borderBottom:'none',color:a?'#00d4ff':'#7a9ab8',
                    borderRadius:'8px 8px 0 0',padding:'8px 18px',
                    fontSize:13,fontWeight:a?700:400,whiteSpace:'nowrap'}}>{tb.lb}</button>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{maxWidth:740,margin:'0 auto',padding:'12px 12px 0'}}>

        {/* 週報 */}
        {tab==='rpt' && (
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
              <span style={{fontSize:12,color:'#4a6a8a'}}>
                展開卡片填報工作項目
              </span>
              {isAdm && (
                <button onClick={function(){
                    const nm=window.prompt('新成員姓名：');
                    if (!nm||!nm.trim()) return;
                    const cols=['#00d4ff','#39ff14','#ff9500','#ff4da6','#b44dff','#00ffaa','#ffd700'];
                    const col=cols[ms.length%cols.length];
                    setMs(ms.concat([{id:mkId(),nm:nm.trim(),col:col,mood:2,adj:0,cm:'',email:'',pwd:'',items:[]}]));
                    showToast('✅ 已新增：'+nm.trim(),true);
                  }}
                  style={{background:'#0d2030',border:'1px solid #00d4ff',
                    color:'#00d4ff',borderRadius:8,padding:'8px 14px',fontSize:13}}>
                  ＋ 新增成員
                </button>
              )}
            </div>
            {ms.map(function(m){
              return (
                <MCard key={m.id} m={m} score={getScoreFor(m)} isAdmin={isAdm}
                  onEdit={onEditRequest}
                  onScore={function(x){setScoreM(x);}}
                  onDelete={deleteMember}
                  onArchiveItem={archiveItem}
                  onAdviceChange={onAdviceChange}
                  onAddItem={addItemToMember}
                  onRemoveItem={removeItemFromMember}/>
              );
            })}
          </div>
        )}

        {/* 排行 */}
        {tab==='rnk' && (
          <div>
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontSize:28,fontWeight:800,color:'#ffd700',marginBottom:4}}>🏆 排行榜</div>
              <div style={{fontSize:12,color:'#4a6a8a'}}>
                依系統評分排序（完成率 {params.wC}% + 難度 {params.wD}% + 任務量 {params.wI}% + 準時率 {params.wO}%）
              </div>
            </div>
            {ranked.map(function(m,i){
              const acp2 = (m.items&&m.items.length)
                ? Math.round(m.items.reduce(function(a,it){return a+it.cp;},0)/m.items.length):0;
              const sc2 = getScoreFor(m);
              const bdCol = i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#1a2a3a';
              return (
                <div key={m.id} style={{background:'#070f18',border:'1px solid '+bdCol,
                  borderRadius:12,marginBottom:10,padding:'14px 18px',
                  display:'flex',alignItems:'center',gap:14,
                  boxShadow:i===0?'0 0 18px #ffd70033':'none'}}>
                  <span style={{fontSize:28,minWidth:36,textAlign:'center'}}>
                    {i<3?medals[i]:i+1}
                  </span>
                  <div style={{width:42,height:42,borderRadius:'50%',border:'2px solid '+m.col,flexShrink:0,
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:700,
                    color:m.col,background:'linear-gradient(135deg,'+m.col+'22,'+m.col+'55)'}}>
                    {m.nm.slice(-1)}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                      <span style={{color:'#eef4ff',fontWeight:700,fontSize:15}}>{m.nm}</span>
                      <span>{MDS[m.mood]}</span>
                      {m.cm&&<span style={{fontSize:11,color:'#7a9ab8',flex:1,
                        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>「{m.cm}」</span>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{flex:1,height:5,background:'#1a2a3a',borderRadius:3}}>
                        <div style={{height:'100%',width:acp2+'%',background:m.col,borderRadius:3}}/>
                      </div>
                      <span style={{fontSize:12,color:m.col,fontWeight:700}}>{acp2}%</span>
                    </div>
                    <div style={{fontSize:11,color:'#4a6a8a',marginTop:3}}>
                      {m.items?m.items.length:0} 項工作
                      📁 歸檔 {m.items?m.items.filter(function(it){return it.arc;}).length:0}
                    </div>
                  </div>
                  <div style={{textAlign:'center',flexShrink:0}}>
                    <div style={{fontSize:24,fontWeight:800,color:scCol(sc2)}}>{sc2.toFixed(1)}</div>
                    <div style={{fontSize:10,color:'#4a6a8a'}}>/ 10 分</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* 統計 */}
        {tab==='stat' && (function(){
          var allIt = ms.reduce(function(a,m){return a.concat(m.items||[]);}, []);
          var actIt = allIt.filter(function(it){return !it.arc;});
          var clearRate = actIt.length ? Math.round(actIt.filter(function(it){return it.cp===100;}).length/actIt.length*100) : 0;
          var avgDfAll = actIt.length ? Math.round(actIt.reduce(function(a,it){return a+(it.df||3);},0)/actIt.length*10)/10 : 0;
          var curYM = new Date().getFullYear()+'/'+String(new Date().getMonth()+1).padStart(2,'0');
          var monthDone = ms.reduce(function(a,m){
            return a+(m.items?m.items.filter(function(it){return it.arc&&it.arcAt&&it.arcAt.startsWith(curYM);}).length:0);
          },0);
          var stats = [
            {lb:'本週工作清空率', val:clearRate+'%',         col:'#00d4ff', ic:'🧹'},
            {lb:'目前工作難度平均', val:'★ '+avgDfAll,       col:'#ffd700', ic:'⚡'},
            {lb:'本月完成工作數目', val:monthDone+' 項',     col:'#00ffaa', ic:'📁'},
            {lb:'AI 考核平均分數', val:avgScore.toFixed(1)+' 分', col:'#b44dff', ic:'🤖'},
          ];
          return (
          <div>
            <div className="stat-grid">
              {stats.map(function(s,i){
                return (
                  <div key={i} style={{background:'#070f18',border:'1px solid #1a2a3a',
                    borderRadius:12,padding:'14px',textAlign:'center'}}>
                    <div style={{fontSize:26,marginBottom:5}}>{s.ic}</div>
                    <div style={{fontSize:20,fontWeight:800,color:s.col,marginBottom:4}}>{s.val}</div>
                    <div style={{fontSize:11,color:'#4a6a8a'}}>{s.lb}</div>
                  </div>
                );
              })}
            </div>
            {ms.map(function(m){
              const acp3 = (m.items&&m.items.length)
                ? Math.round(m.items.reduce(function(a,it){return a+it.cp;},0)/m.items.length):0;
              const sc3 = getScoreFor(m);
              const base3 = baseScores[m.id]||5;
              const tot3 = m.items?m.items.length:0;
              const arc3 = m.items?m.items.filter(function(it){return it.arc;}).length:0;
              const avgDf3 = tot3 ? Math.round(m.items.reduce(function(a,it){return a+(it.df||3);},0)/tot3*10)/10 : 0;
              return (
                <div key={m.id} style={{background:'#070f18',border:'1px solid #1a2a3a',
                  borderRadius:12,padding:'14px 16px',marginBottom:8}}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:38,height:38,borderRadius:'50%',border:'2px solid '+m.col,flexShrink:0,
                      display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,
                      color:m.col,background:'linear-gradient(135deg,'+m.col+'22,'+m.col+'55)'}}>
                      {m.nm.slice(-1)}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                        <span style={{color:'#eef4ff',fontWeight:700,fontSize:14}}>{m.nm}</span>
                        <span style={{fontSize:11,color:'#5a7a9a'}}>

                        </span>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <div style={{flex:1,height:6,background:'#1a2a3a',borderRadius:3}}>
                          <div style={{height:'100%',width:acp3+'%',
                            background:'linear-gradient(90deg,'+m.col+','+m.col+'aa)',
                            borderRadius:3,transition:'width .6s'}}/>
                        </div>
                        <span style={{fontSize:12,color:m.col,fontWeight:700,minWidth:34}}>{acp3}%</span>
                      </div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                      <Ring p={acp3} c={m.col} s={40}/>
                      <div style={{textAlign:'center',minWidth:38}}>
                        <div style={{fontSize:18,fontWeight:700,color:scCol(sc3)}}>{sc3.toFixed(1)}</div>
                        <div style={{fontSize:9,color:'#4a6a8a'}}>基準{base3.toFixed(1)}</div>
                      </div>
                    </div>
                  </div>
                  {/* 分類分佈 */}
                  {m.items && m.items.length > 0 && (
                    <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap',paddingLeft:50}}>
                      {['buy','exp','safe','rou','other'].map(function(ck){
                        const cnt = m.items.filter(function(it){return (it.cat||'other')===ck;}).length;
                        if (!cnt) return null;
                        const c2 = CATS.filter(function(c){return c.k===ck;});
                        const cObj = c2.length ? c2[0] : CATS[3];
                        return (
                          <span key={ck} style={{fontSize:11,padding:'2px 8px',borderRadius:10,
                            background:cObj.bg,color:cObj.col,border:'1px solid '+cObj.col+'55'}}>
                            {cObj.ic} {cObj.lb} ×{cnt}
                          </span>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          );
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
